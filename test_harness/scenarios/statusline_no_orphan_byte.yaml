# Cicatrice sess.1232: ${VAR:+$VAR·} in locale UTF-8 produceva 0xB7 orfano.
# Test verifica che l'output di statusline.sh non contenga byte 0xB7 senza 0xC2 precedente.
name: Statusline No Orphan Byte
description: statusline.sh output deve avere middot UTF-8 sempre completi (0xC2 0xB7)
timeout: 8

setup: |
  test -f /tmp/statusline_debug_input.txt

action: |
  /Users/mattiacalastri/scripts/statusline.sh < /tmp/statusline_debug_input.txt > /tmp/sl_check.out 2>/dev/null

check: |
  /opt/homebrew/bin/python3 -c "
  with open('/tmp/sl_check.out', 'rb') as f: data = f.read()
  for i, b in enumerate(data):
      if b == 0xB7:
          if i == 0 or data[i-1] != 0xC2:
              print(f'ORPHAN 0xB7 at byte {i}'); exit(1)
  print('OK')
  "

teardown: ""
